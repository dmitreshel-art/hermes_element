model:
  # Change provider/model if the helpdesk profile should use another backend.
  provider: openai-codex
  default: gpt-5.4-mini

agent:
  # User-facing helpdesk answers often need a few file reads from knowledge/.
  max_turns: 10
  tool_use_enforcement: true

memory:
  memory_enabled: true
  user_profile_enabled: true

matrix:
  # DMs can be answered directly. Shared rooms should be restricted explicitly.
  require_mention: false
  auto_thread: true
  dm_mention_threads: false
  free_response_rooms: []

# Keep the user-facing profile narrow: local KB + compact support memory/skills.
platform_toolsets:
  cli:
    - file
    - memory
    - skills
  matrix:
    - file
    - memory
    - skills
