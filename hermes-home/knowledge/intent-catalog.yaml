intents:
  - id: login
    examples:
      - Не могу войти в Element
      - Как зайти первый раз?
      - Почему не работает SSO?
    route_to:
      - howto:first-login
      - troubleshooting:cant-login
      - escalation:support-contacts

  - id: notifications
    examples:
      - Как отключить лишние уведомления?
      - Хочу получать только упоминания
    route_to:
      - faq:notifications
      - howto:notification-settings

  - id: encryption
    examples:
      - Почему не видно старые сообщения?
      - Как подтвердить устройство?
      - Что делать с ключами?
    route_to:
      - faq:encryption
      - howto:verify-device
      - troubleshooting:cant-decrypt
      - escalation:support-contacts

  - id: rooms
    examples:
      - Как найти нужную комнату?
      - Кто создаёт пространства?
      - Как пользоваться тредами?
    route_to:
      - faq:rooms
      - policy:messenger-policy

  - id: security_incident
    examples:
      - Похоже, аккаунт взломали
      - Устройство потеряно
      - Вижу неизвестную сессию
    route_to:
      - escalation:security
      - howto:device-sessions
