services:
  element-helpdesk:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hermes-element-helpdesk
    restart: unless-stopped
    env_file:
      - path: ../hermes-home/.env
        required: false
    volumes:
      # Main portable Hermes home: config, prompts, KB, logs, .env
      - ../hermes-home:/home/hermes
      # Persist memory, skills and session history across restarts
      - hermes-memory:/home/hermes/.hermes/memory
      - hermes-skills:/home/hermes/.hermes/skills
      - hermes-sessions:/home/hermes/.hermes/sessions
    environment:
      HERMES_HOME: /home/hermes
    command: ["gateway", "run"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /home/hermes/config.yaml && test -d /home/hermes/knowledge"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  hermes-memory:
  hermes-skills:
  hermes-sessions:
