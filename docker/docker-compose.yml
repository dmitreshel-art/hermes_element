services:
  hermes-element-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-element-gateway
    restart: unless-stopped
    environment:
      HERMES_HOME: /data
      TZ: UTC
    volumes:
      - ./hermes-home:/data
    command: ["hermes", "gateway", "run"]

# No inbound ports are required for Matrix polling mode.
# Outbound connectivity to your homeserver and model provider is enough.
