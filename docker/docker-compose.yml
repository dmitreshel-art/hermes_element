services:
  hermes-element-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hermes-element-gateway
    restart: unless-stopped
    environment:
      HERMES_HOME: /data
      TZ: UTC
    env_file:
      - ../hermes-home/.env
    volumes:
      - ../hermes-home:/data
    command: ["hermes", "gateway", "run"]

# No inbound ports are required for Matrix polling mode.
# Outbound connectivity to the Matrix homeserver and model provider is enough.
